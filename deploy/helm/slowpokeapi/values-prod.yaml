replicaCount: 3

resources:
  limits:
    cpu: 1000m
    memory: 512Mi
  requests:
    cpu: 200m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

pdb:
  enabled: true
  minAvailable: 2

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: api.slowpokeapi.io
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: slowpokeapi-tls
      hosts:
        - api.slowpokeapi.io

serviceMonitor:
  enabled: true
  interval: 15s
  labels:
    release: prometheus

config:
  logLevel: warn
  cacheTtlSeconds: 1800
