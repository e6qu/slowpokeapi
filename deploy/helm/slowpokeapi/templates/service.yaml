apiVersion: v1
kind: Service
metadata:
  name: {{ include "slowpokeapi.fullname" . }}
  labels:
    {{- include "slowpokeapi.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "slowpokeapi.selectorLabels" . | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "slowpokeapi.fullname" . }}-headless
  labels:
    {{- include "slowpokeapi.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.service.syncPort }}
      targetPort: sync
      protocol: TCP
      name: sync
  selector:
    {{- include "slowpokeapi.selectorLabels" . | nindent 4 }}
