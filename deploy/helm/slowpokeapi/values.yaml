replicaCount: 3

image:
  repository: ghcr.io/e6qu/slowpokeapi
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8080"
  prometheus.io/path: "/metrics"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

service:
  type: ClusterIP
  port: 8080
  syncPort: 8081

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: api.slowpokeapi.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

pdb:
  enabled: false
  minAvailable: 1
  maxUnavailable: ""

persistence:
  enabled: false
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 1Gi

config:
  logLevel: info
  cacheTtlSeconds: 3600
  upstreamTimeoutSeconds: 10

sync:
  enabled: true
  gossipIntervalSeconds: 5
  fanout: 3
  discovery:
    method: dns
    dnsName: ""
    staticPeers: []

upstream:
  frankfurter:
    enabled: true
    baseUrl: https://api.frankfurter.app
  fawaz:
    enabled: true
    baseUrl: https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1
  coingecko:
    enabled: true
    baseUrl: https://api.coingecko.com/api/v3

auth:
  enabled: false
  existingSecret: ""

serviceMonitor:
  enabled: false
  namespace: ""
  interval: 30s
  scrapeTimeout: 10s
  labels: {}

statefulSet:
  enabled: false
