services:
  slowpokeapi-1:
    build:
      context: .
      dockerfile: Dockerfile.debug
    image: slowpokeapi:debug
    hostname: slowpokeapi-1
    ports:
      - "8080:8080"
      - "8081:8081"
    volumes:
      - slowpokeapi-data-1:/data
    environment:
      - SLOWPOKEAPI_LOG_LEVEL=info
      - SLOWPOKEAPI_SYNC_ENABLED=true
      - SLOWPOKEAPI_SYNC_STATIC_PEERS=slowpokeapi-2:8081,slowpokeapi-3:8081
    networks:
      - slowpokeapi-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

  slowpokeapi-2:
    build:
      context: .
      dockerfile: Dockerfile.debug
    image: slowpokeapi:debug
    hostname: slowpokeapi-2
    ports:
      - "8082:8080"
      - "8083:8081"
    volumes:
      - slowpokeapi-data-2:/data
    environment:
      - SLOWPOKEAPI_LOG_LEVEL=info
      - SLOWPOKEAPI_SYNC_ENABLED=true
      - SLOWPOKEAPI_SYNC_STATIC_PEERS=slowpokeapi-1:8081,slowpokeapi-3:8081
    networks:
      - slowpokeapi-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

  slowpokeapi-3:
    build:
      context: .
      dockerfile: Dockerfile.debug
    image: slowpokeapi:debug
    hostname: slowpokeapi-3
    ports:
      - "8084:8080"
      - "8085:8081"
    volumes:
      - slowpokeapi-data-3:/data
    environment:
      - SLOWPOKEAPI_LOG_LEVEL=info
      - SLOWPOKEAPI_SYNC_ENABLED=true
      - SLOWPOKEAPI_SYNC_STATIC_PEERS=slowpokeapi-1:8081,slowpokeapi-2:8081
    networks:
      - slowpokeapi-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - slowpokeapi-1
      - slowpokeapi-2
      - slowpokeapi-3
    networks:
      - slowpokeapi-net

volumes:
  slowpokeapi-data-1:
  slowpokeapi-data-2:
  slowpokeapi-data-3:

networks:
  slowpokeapi-net:
    driver: bridge
