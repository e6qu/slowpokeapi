# Clippy configuration
# https://rust-lang.github.io/rust-clippy/master/index.html

# Allow these lints
avoid-breaking-exported-api = false

# Cognitive complexity threshold
cognitive-complexity-threshold = 25

# Documentation requirements
missing-docs-in-crate-items = false

# Type complexity threshold
type-complexity-threshold = 250

# Blacklist of disallowed types
disallowed-types = [
    # Use tokio::sync types instead
    "std::sync::Mutex",
    "std::sync::RwLock",
]

# Note: Removed disallowed-methods for unwrap/expect
# This was causing false positives with utoipa macro expansions
# We'll rely on code review to catch misuse of unwrap
